<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080808" />
    <title>Forge is offline</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f9f9f7;
        --text: #111111;
        --muted: #8a8a8a;
        --border: #ebebeb;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d0d0d;
          --text: #f0f0f0;
          --muted: #8a8a8a;
          --border: #222222;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(100%, 560px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.04em;
        margin-bottom: 64px;
      }

      .mark {
        width: 18px;
        height: 18px;
        background: var(--text);
        clip-path: polygon(50% 0, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      }

      .label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      h1 {
        font-size: clamp(28px, 7vw, 44px);
        line-height: 1.04;
        letter-spacing: -0.055em;
        margin: 0 0 18px;
      }

      p {
        color: var(--muted);
        font-size: 16px;
        line-height: 1.65;
        margin: 0;
        max-width: 460px;
      }

      .rule {
        width: 100%;
        height: 1px;
        background: var(--border);
        margin: 38px 0;
      }

      button {
        appearance: none;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        padding: 12px 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand"><span class="mark"></span>Forge</div>
      <div class="label">Offline</div>
      <h1>Connection dropped. Keep the commitment.</h1>
      <p>Forge will reconnect when the network returns. Any open page that was cached can still load from this device.</p>
      <div class="rule"></div>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
