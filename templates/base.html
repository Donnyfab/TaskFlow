  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'system';
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const useDark = savedTheme === 'dark' || (savedTheme === 'system' && prefersDark);
      document.documentElement.classList.toggle('dark', useDark);
    })();
  </script>

    height: 100%;

</style>

    {% block scripts %}{% endblock %}

    <script>
      /* =====================================================
         SIDEBAR (Left navigation collapse)
         ===================================================== */
      
      const SIDEBAR_STORAGE_KEY = "sidebar-collapsed";

      function getStoredSidebarState() {
        try {
          const stored = localStorage.getItem(SIDEBAR_STORAGE_KEY);
          return stored === null ? false : stored === "true";
        } catch (error) {
          return false;
        }
      }

      function persistSidebarState(collapsed) {
        try {
          localStorage.setItem(SIDEBAR_STORAGE_KEY, String(collapsed));
        } catch (error) {
          // Ignore storage failures (private mode, etc.)
        }
        window.AppShell = window.AppShell || {};
        window.AppShell.sidebarCollapsed = collapsed;
      }

      function setSidebarCollapsed(collapsed) {
        const layout = document.getElementById("dashboardLayout");
        const sidebar = document.getElementById("sidebar");

        if (!layout || !sidebar) return;

        layout.classList.toggle("sidebar-collapsed", collapsed);
        sidebar.setAttribute("aria-hidden", String(collapsed));
        persistSidebarState(collapsed);
      }

      /**
       * Toggles the sidebar collapsed state.
       * - Adds/removes a CSS class on the layout
       * - Updates aria-hidden for accessibility
       * - Persists the state for future navigations
       */
      function toggleSidebar() {
        const layout = document.getElementById("dashboardLayout");
        if (!layout) return;
        const collapsed = !layout.classList.contains("sidebar-collapsed");
        setSidebarCollapsed(collapsed);
      }

      (function initSidebarState() {
        setSidebarCollapsed(getStoredSidebarState());
      })();
      
      
      /* =====================================================
         USER MENU (Profile avatar dropdown)
         ===================================================== */
      
      /**
       * Toggles the user dropdown menu (avatar menu)
       */
      function toggleUserMenu() {
        document.getElementById("userMenu")?.classList.toggle("hidden");
      }
      
      /**
       * Close the user menu when clicking anywhere outside
       */
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".relative")) {
          document.getElementById("userMenu")?.classList.add("hidden");
        }
      });

      function closeUserMenu() {
  document.getElementById("userMenu")?.classList.add("hidden");
}

      
      
      /* =====================================================
         SETTINGS MODAL
         ===================================================== */
      
      /**
       * Opens the settings modal and loads content via fetch
       */
      function openSettings() {
        const overlay = document.getElementById("settingsOverlay");
        const content = document.getElementById("settingsContent");
      
        document.getElementById("userMenu")?.classList.add("hidden");
        overlay?.classList.remove("hidden");
        overlay?.classList.add("flex");
      
        // Load settings HTML from backend
        fetch("/account?modal=1")
          .then(res => res.text())
          .then(html => {
            if (!content) return;
            content.innerHTML = html;
            initializeSettingsNav();
            initializeThemeRadios();
          });
      }
      
      /**
       * Closes settings modal and clears content
       */
      function closeSettings() {
        document.getElementById("settingsOverlay")?.classList.add("hidden");
        const content = document.getElementById("settingsContent");
        if (content) content.innerHTML = "";
      }
      
      
      /* =====================================================
         CREATE LIST MODAL
         ===================================================== */
      
         function openCreateListModal() {
  const overlay = document.getElementById("createListOverlay");
  if (!overlay) return;

  overlay.classList.remove("hidden");

  // ✅ Focus the input after opening
  const input = overlay.querySelector("input[name='name']");
  input?.focus();
}


      
function closeCreateListModal() {
  const overlay = document.getElementById("createListOverlay");
  if (!overlay) return;

  overlay.classList.add("hidden");

  const input = overlay.querySelector("input[name='name']");
  if (input) input.value = "";
}

      
      
      /* =====================================================
         LIST ACTION MENU (⋮ per list)
         ===================================================== */
      
      /**
       * Toggles the 3-dot menu for a specific list
       */
       function toggleListMenu(id) {
  // Close all other open list menus
  document.querySelectorAll("[id^='listMenu-']").forEach(menu => {
    menu.classList.add("hidden");
  });

  // Toggle the clicked one
  const menu = document.getElementById(`listMenu-${id}`);
  menu?.classList.toggle("hidden");
}

/* =====================================================
   CLOSE LIST MENUS ON OUTSIDE CLICK
   ===================================================== */
   document.addEventListener("click", (e) => {
  // If click is inside a list menu or its button, do nothing
  if (e.target.closest(".list-menu-wrapper")) return;

  // Otherwise close all list menus
  document.querySelectorAll("[id^='listMenu-']").forEach(menu => {
    menu.classList.add("hidden");
  });
});


      
      
      /* =====================================================
         RENAME LIST MODAL
         ===================================================== */
      
      /**
       * Opens rename modal and dynamically updates:
       * - input value
       * - form action URL
       */
       function openRenameListModal(id, name) {
  // Close any open list menus
  document.querySelectorAll("[id^='listMenu-']").forEach(menu => {
    menu.classList.add("hidden");
  });

  const overlay = document.getElementById("renameListOverlay");
  if (!overlay) return;

  const input = overlay.querySelector("input[name='name']");

  input.value = name;
  overlay.querySelector("form").action = `/lists/rename/${id}`;
  overlay.classList.remove("hidden");

  // ✅ Focus input after modal opens
  input.focus();
}
      
function closeRenameListModal() {
  document.getElementById("renameListOverlay")?.classList.add("hidden");
}

      
      
      /* =====================================================
         DELETE LIST MODAL
         ===================================================== */
      
      /**
       * Opens delete confirmation modal
       * and updates the form action dynamically
       */
      function openDeleteListModal(id) {
        document.querySelectorAll("[id^='listMenu-']").forEach(menu => {
          menu.classList.add("hidden");
        });

        const overlay = document.getElementById("deleteListOverlay");
        if (!overlay) return;
      
        overlay.querySelector("form").action = `/lists/delete/${id}`;
        overlay.classList.remove("hidden");
      }
      
      function closeDeleteListModal() {
        document.getElementById("deleteListOverlay")?.classList.add("hidden");
      }
      
      
      /* =====================================================
         PROFILE IMAGE UPLOAD
         ===================================================== */
      
      /**
       * Uploads profile image via fetch (AJAX)
       * Reloads page after success
       */
      function uploadProfileImage(input) {
        if (!input.files || !input.files[0]) return;
      
        const formData = new FormData();
        formData.append("profile_image", input.files[0]);
      
        fetch("/upload_profile", {
          method: "POST",
          body: formData
        }).then(() => location.reload());
      }
      
      
      /* =====================================================
         SETTINGS NAVIGATION (Tabs inside modal)
         ===================================================== */
      
      /**
       * Shows a specific settings section
       * and highlights the active nav button
       */
      function showSection(id, btn) {
        const overlay = document.getElementById("settingsOverlay");
        if (!overlay) return;
      
        overlay.querySelectorAll(".settings-section")
          .forEach(section => section.classList.add("hidden"));
      
        overlay.querySelector(`#${id}`)?.classList.remove("hidden");
      
        overlay.querySelectorAll(".nav-btn").forEach(button => {
          button.classList.remove("bg-[#3a3a3a]", "text-white");
          button.classList.add("text-gray-300");
        });
      
        btn?.classList.add("bg-[#3a3a3a]", "text-white");
      }
      
      /**
       * Initializes default active settings tab
       */
      function initializeSettingsNav() {
        const overlay = document.getElementById("settingsOverlay");
        const firstBtn = overlay?.querySelector(".nav-btn");
      
        if (firstBtn) {
          showSection(firstBtn.dataset.section || "account", firstBtn);
        }
      }
      
      
      /* =====================================================
         THEME SELECTION (Light / Dark / System)
         ===================================================== */
      
      function initializeThemeRadios() {
        const radios = document.querySelectorAll('input[name="theme"]');
        if (!radios.length) return;
      
        const savedTheme =
          window.ThemeManager?.theme ||
          localStorage.getItem("theme") ||
          "system";
      
        radios.forEach(radio => {
          radio.checked = radio.value === savedTheme;
      
          radio.addEventListener("change", () => {
            if (window.ThemeManager?.setTheme) {
              ThemeManager.setTheme(radio.value);
            } else {
              localStorage.setItem("theme", radio.value);
              document.documentElement.classList.toggle(
                "dark",
                radio.value === "dark" ||
                (radio.value === "system" &&
                  window.matchMedia("(prefers-color-scheme: dark)").matches)
              );
            }
          });
        });
      }
      
      
      /* =====================================================
         ESC KEY HANDLER (Global)
         ===================================================== */
      
      /**
       * Handles ESC key:
       * 1. Close settings modal if open
       * 2. Otherwise collapse sidebar
       */
       document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;

  // 1️⃣ Rename List Modal
  const renameOpen =
    !document.getElementById("renameListOverlay")?.classList.contains("hidden");

  if (renameOpen) {
    closeRenameListModal();
    return;
  }

  // 2️⃣ Delete List Modal
  const deleteOpen =
    !document.getElementById("deleteListOverlay")?.classList.contains("hidden");

  if (deleteOpen) {
    closeDeleteListModal();
    return;
  }


  // 3️⃣ Create List Modal
  if (!document.getElementById("createListOverlay")?.classList.contains("hidden")) {
    closeCreateListModal();
    return;
  }


  // 3️⃣ Settings Modal
  const settingsOpen =
    !document.getElementById("settingsOverlay")?.classList.contains("hidden");

  if (settingsOpen) {
    closeSettings();
    return;
  }

    // 5️⃣ User dropdown (avatar menu)
    if (!document.getElementById("userMenu")?.classList.contains("hidden")) {
    closeUserMenu();
    return;
  }


  // 4️⃣ Close any open list menus (⋮)
  document.querySelectorAll("[id^='listMenu-']").forEach(menu => {
    menu.classList.add("hidden");
  });

});

      
      /* =====================================================
         TASK LIST COLLAPSE (Sidebar lists)
         ===================================================== */
      
      /**
       * Expands / collapses task list group in sidebar
       */
      function toggleTaskLists() {
        const list = document.getElementById("taskLists");
        const chevron = document.getElementById("tasksChevron");
      
        if (!list || !chevron) return;
      
        list.classList.toggle("hidden");
        chevron.classList.toggle("rotate-90");
      }

      /* =====================================================
         NOTES SIDEBAR (Mobile reset to root)
         ===================================================== */

      (function initNotesNavMobileReset() {
        const notesLink = document.getElementById("notesNavLink");
        if (!notesLink) return;

        const mobileQuery = window.matchMedia("(max-width: 767px)");
        const desktopHref =
          notesLink.getAttribute("data-desktop-href") || "/notes";
        const mobileHref =
          notesLink.getAttribute("data-mobile-href") || "/notes?view=root";

        function syncNotesLinkHref() {
          const nextHref = mobileQuery.matches ? mobileHref : desktopHref;
          notesLink.setAttribute("href", nextHref);
        }

        notesLink.addEventListener("click", (event) => {
          if (!mobileQuery.matches) return;
          event.preventDefault();
          window.location.href = mobileHref;
        });

        syncNotesLinkHref();
        mobileQuery.addEventListener("change", syncNotesLinkHref);
      })();

      /* =====================================================
         DRAG-AND-DROP LIST REORDERING
         ===================================================== */

let draggedCard = null;

document.addEventListener("dragstart", (e) => {
  if (!e.target.classList.contains("list-card")) return;
  draggedCard = e.target;
  e.target.classList.add("opacity-50");
});

document.addEventListener("dragend", (e) => {
  if (!draggedCard) return;
  draggedCard.classList.remove("opacity-50");
  draggedCard = null;
  saveListOrder();
});

document.addEventListener("dragover", (e) => {
  e.preventDefault();
  const target = e.target.closest(".list-card");
  if (!target || target === draggedCard) return;

  const container = document.getElementById("listsContainer");
  const cards = [...container.children];
  const draggedIndex = cards.indexOf(draggedCard);
  const targetIndex = cards.indexOf(target);

  if (draggedIndex < targetIndex) {
    container.insertBefore(draggedCard, target.nextSibling);
  } else {
    container.insertBefore(draggedCard, target);
  }
});

function saveListOrder() {
  const order = [...document.querySelectorAll(".list-card")]
    .map(card => card.dataset.id);

  fetch("/lists/reorder", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ order })
  });
}

</script>
