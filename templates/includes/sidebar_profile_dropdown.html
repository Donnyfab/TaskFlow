<div class="sb-spacer"></div>

<div class="sb-profile" data-profile-root>
  <button
    type="button"
    class="sb-user"
    data-profile-toggle
    aria-haspopup="true"
    aria-expanded="false"
  >
    <div class="sb-avatar">
      {% if profile_image and profile_image != 'default.png' %}
        <img
          src="{{ url_for('static', filename='uploads/' + profile_image) }}"
          alt="{{ full_name if full_name else (sidebar_user_name if sidebar_user_name is defined else (username if username else 'User')) }}"
          class="sb-avatar-img"
        >
      {% else %}
        {{ sidebar_user_initials if sidebar_user_initials is defined else (user_initials if user_initials else 'TF') }}
      {% endif %}
    </div>
    <div class="sb-user-meta">
      <div class="sb-user-name">{{ sidebar_user_name if sidebar_user_name is defined else (username if username else 'Guest') }}</div>
      <div class="sb-user-plan">{{ sidebar_user_plan if sidebar_user_plan is defined else 'Free plan' }}</div>
    </div>
    <div class="sb-user-caret" aria-hidden="true">
      <svg viewBox="0 0 10 6" fill="none" width="10" height="6">
        <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </button>

  <div class="sb-user-menu" data-profile-menu>
    <a href="{{ url_for('account_page') }}" class="sb-user-menu-item">Account</a>
    <a href="{{ url_for('settings_page') }}" class="sb-user-menu-item">Settings</a>
    <a href="{{ url_for('logout') }}" class="sb-user-menu-item danger">Log out</a>
  </div>
</div>
